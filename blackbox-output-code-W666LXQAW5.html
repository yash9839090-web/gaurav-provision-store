  form { display: flex; flex-direction: column; }
  input, textarea { padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }
  button { background: #f58426; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
  button:hover { background: #e46b00; }
  p.contact-info { text-align: center; margin-top: 20px; font-weight: 600; }
  a.whatsapp { text-align:center; display:block; margin-top:15px; font-weight:700; color:#25d366; text-decoration:none; }

<div class="container">
  <h2>Contact Us</h2>
  <form action="#" method="post" onsubmit="alert('Thank you for contacting! We will get back to you soon.');return false;">

  <p class="contact-info">Phone: +91-XXXXXXXXXX</p>
